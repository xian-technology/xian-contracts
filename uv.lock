name = "xian-contracts-hub"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "xian-accounts" },
    { name = "xian-contracting", extra = ["zk"] },
    { name = "xian-linter" },
]

[package.dev-dependencies]
dev = [
    { name = "pytest" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "xian-accounts", editable = "../xian-contracting/packages/xian-accounts" },
    { name = "xian-contracting", extras = ["zk"], editable = "../xian-contracting" },
    { name = "xian-linter", editable = "../xian-linter" },
]

[package.metadata.requires-dev]
dev = [
    { name = "pytest", specifier = ">=9.0.2,<10" },
    { name = "ruff", specifier = ">=0.15.6,<0.16" },
]

[[package]]
name = "xian-linter"
version = "0.3.0"
source = { editable = "../xian-linter" }
dependencies = [
    { name = "pydantic" },
    { name = "pyflakes" },
    { name = "xian-contracting" },
]

[package.metadata]
requires-dist = [
    { name = "fastapi", marker = "extra == 'server'", specifier = ">=0.115.6,<1" },
    { name = "pydantic", specifier = ">=2,<3" },
    { name = "pyflakes", specifier = ">=3.2,<4" },
    { name = "uvicorn", marker = "extra == 'server'", specifier = ">=0.34,<1" },
    { name = "xian-contracting", editable = "../xian-contracting" },
]
provides-extras = ["server"]

[package.metadata.requires-dev]
dev = [
    { name = "pytest", specifier = ">=9.0.2,<10" },
    { name = "ruff", specifier = ">=0.15.6,<0.16" },
]

[[package]]
name = "xian-runtime-types"
version = "0.1.0"
source = { editable = "../xian-contracting/packages/xian-runtime-types" }

[[package]]
name = "xian-zk"
version = "0.1.0"
source = { editable = "../xian-contracting/packages/xian-zk" }

[package.metadata]

[package.metadata.requires-dev]
dev = [
    { name = "maturin", specifier = ">=1.8,<2" },
    { name = "pytest", specifier = ">=9.0.2,<10" },
]
