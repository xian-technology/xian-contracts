name: Validate

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xian-contracts
        uses: actions/checkout@v6
        with:
          path: xian-contracts

      - name: Checkout xian-contracting
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-contracting
          ref: main
          path: xian-contracting

      - name: Use matching xian-contracting branch when available
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref || github.ref_name }}"
          REMOTE="https://github.com/${{ github.repository_owner }}/xian-contracting"
          if git ls-remote --exit-code --heads "$REMOTE" "$BRANCH" >/dev/null 2>&1; then
            git -C xian-contracting fetch --depth=1 origin "$BRANCH"
            git -C xian-contracting checkout -B "$BRANCH" FETCH_HEAD
          fi

      - name: Checkout xian-linter
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-linter
          ref: main
          path: xian-linter

      - name: Checkout xian-configs
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-configs
          ref: main
          path: xian-configs

      - name: Use matching xian-configs branch when available
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.head_ref || github.ref_name }}"
          REMOTE="https://github.com/${{ github.repository_owner }}/xian-configs"
          if git ls-remote --exit-code --heads "$REMOTE" "$BRANCH" >/dev/null 2>&1; then
            git -C xian-configs fetch --depth=1 origin "$BRANCH"
            git -C xian-configs checkout -B "$BRANCH" FETCH_HEAD
          fi

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        working-directory: xian-contracts
        run: uv sync --group dev

      - name: Ruff lint
        working-directory: xian-contracts
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: xian-contracts
        run: uv run ruff format --check .

      - name: Audit Python VM contract compatibility
        working-directory: xian-contracts
        run: |
          uv run --project ../xian-contracting python \
            ../xian-contracting/scripts/audit_python_vm_compatibility.py \
            ./contracts \
            --fail-on-issues
      - name: Audit authored contract conformance coverage
        working-directory: xian-contracts
        run: |
          uv run --project ../xian-contracting python \
            ../xian-contracting/scripts/audit_authored_conformance.py \
            ./contracts \
            --fail-on-issues

      - name: Run tests
        working-directory: xian-contracts
        run: uv run pytest -q
